<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit URL - URL Shortener Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .edit-box { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .code { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; }
        input[type="url"] { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .actions { display: flex; gap: 0.5rem; }
        .btn { padding: 0.625rem 1.25rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #e5e7eb; color: #1a1a1a; }
        .btn-secondary:hover { background: #d1d5db; }
        .error { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="edit-box">
        <h1>Edit URL</h1>
        <p class="code">Short code: {{.URL.Code}}</p>
        {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
        <form method="POST" action="/admin/urls/{{.URL.ID}}/edit">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div class="field">
                <label for="url">Original URL</label>
                <input type="url" id="url" name="url" value="{{.URL.OriginalURL}}" required>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/admin" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
